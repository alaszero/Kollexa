{% extends "base.html" %}
{% block title %}{{ 'Editar' if user else 'Nuevo' }} Usuario - Kollexa{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('users.index') }}"
           class="bg-gray-200 hover:bg-gray-300 p-3 rounded-xl transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-800">
            {{ 'Editar Usuario' if user else 'Nuevo Usuario' }}
        </h1>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            {% if not user %}
            <!-- Username (solo para nuevo) -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                    Usuario *
                </label>
                <input type="text" id="username" name="username" required
                       value="{{ data.get('username', '') }}"
                       placeholder="Ej: juan_perez"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>
            {% else %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                <p class="px-4 py-3 bg-gray-50 rounded-xl text-lg text-gray-600">@{{ user.username }}</p>
            </div>
            {% endif %}

            <!-- Nombre completo -->
            <div>
                <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">
                    Nombre completo *
                </label>
                <input type="text" id="full_name" name="full_name" required
                       value="{{ data.get('full_name') or (user.full_name if user else '') or '' }}"
                       placeholder="Ej: Juan Perez Lopez"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Email <span class="text-gray-400">(opcional)</span>
                </label>
                <input type="email" id="email" name="email"
                       value="{{ data.get('email') or (user.email if user else '') or '' }}"
                       placeholder="correo@ejemplo.com"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <!-- Telefono -->
            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">
                    Telefono <span class="text-gray-400">(opcional)</span>
                </label>
                <input type="tel" id="phone" name="phone"
                       value="{{ data.get('phone') or (user.phone if user else '') or '' }}"
                       placeholder="55-1234-5678"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <!-- Contrasena -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    {% if user %}
                    Nueva contrasena <span class="text-gray-400">(dejar vacio para no cambiar)</span>
                    {% else %}
                    Contrasena *
                    {% endif %}
                </label>
                <input type="password" id="password" name="password"
                       {% if not user %}required{% endif %}
                       minlength="6"
                       placeholder="Minimo 6 caracteres"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <!-- Rol -->
            <div>
                <label for="role" class="block text-sm font-medium text-gray-700 mb-1">
                    Rol *
                </label>
                <select id="role" name="role" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg bg-white
                               focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    {% set current_role = (user.roles[0].name if user and user.roles else '') %}
                    {% for role in roles %}
                    {% if role.name != 'support' or current_user.has_role('support') %}
                    <option value="{{ role.name }}" {% if role.name == current_role %}selected{% endif %}>
                        {{ role.name|capitalize }}
                        {% if role.description %} - {{ role.description }}{% endif %}
                    </option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>

            <!-- Botones -->
            <div class="flex gap-3 pt-4">
                <button type="submit"
                        class="flex-1 bg-primary-600 hover:bg-primary-700 text-white
                               font-semibold py-4 rounded-xl text-lg transition active:scale-[0.98]">
                    {{ 'Guardar Cambios' if user else 'Crear Usuario' }}
                </button>
                <a href="{{ url_for('users.index') }}"
                   class="px-6 py-4 bg-gray-200 hover:bg-gray-300 text-gray-700
                          rounded-xl text-lg font-medium transition text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
