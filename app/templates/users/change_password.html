{% extends "base.html" %}
{% block title %}Cambiar Contrasena - Kollexa{% endblock %}

{% block content %}
<div class="max-w-md mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('web.dashboard') }}"
           class="bg-gray-200 hover:bg-gray-300 p-3 rounded-xl transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-800">Cambiar Contrasena</h1>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <div>
                <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">
                    Contrasena actual *
                </label>
                <input type="password" id="current_password" name="current_password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">
                    Nueva contrasena *
                </label>
                <input type="password" id="new_password" name="new_password" required
                       minlength="6"
                       placeholder="Minimo 6 caracteres"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">
                    Confirmar nueva contrasena *
                </label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <button type="submit"
                    class="w-full bg-primary-600 hover:bg-primary-700 text-white
                           font-semibold py-4 rounded-xl text-lg transition active:scale-[0.98]">
                Cambiar Contrasena
            </button>
        </form>
    </div>
</div>
{% endblock %}
