{% extends "base.html" %}
{% block title %}{{ 'Editar' if product else 'Nuevo' }} Producto - Kollexa{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('products.index') }}"
           class="bg-gray-200 hover:bg-gray-300 p-3 rounded-xl transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-800">
            {{ 'Editar Producto' if product else 'Nuevo Producto' }}
        </h1>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <!-- SKU -->
            <div>
                <label for="sku" class="block text-sm font-medium text-gray-700 mb-1">
                    SKU *
                </label>
                <input type="text" id="sku" name="sku" required
                       value="{{ data.get('sku') or (product.sku if product else '') or '' }}"
                       placeholder="Ej: SART-001"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <!-- Nombre -->
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                    Nombre del producto *
                </label>
                <input type="text" id="name" name="name" required
                       value="{{ data.get('name') or (product.name if product else '') or '' }}"
                       placeholder="Ej: Sarten T-Fal 30cm"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <!-- Descripcion -->
            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
                    Descripcion <span class="text-gray-400">(opcional)</span>
                </label>
                <textarea id="description" name="description" rows="3"
                          placeholder="Descripcion breve del producto..."
                          class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                                 focus:ring-2 focus:ring-primary-500 focus:border-primary-500">{{ data.get('description') or (product.description if product else '') or '' }}</textarea>
            </div>

            <!-- Categoria -->
            <div>
                <label for="category" class="block text-sm font-medium text-gray-700 mb-1">
                    Categoria *
                </label>
                <select id="category" name="category" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg bg-white
                               focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    <option value="">Seleccionar categoria...</option>
                    {% set current_cat = data.get('category') or (product.category if product else '') or '' %}
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if cat == current_cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Precios -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="base_price" class="block text-sm font-medium text-gray-700 mb-1">
                        Precio Costo *
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-3 text-gray-400 text-lg">$</span>
                        <input type="number" id="base_price" name="base_price" required
                               step="0.01" min="0.01"
                               value="{{ data.get('base_price') or (product.base_price if product else '') or '' }}"
                               placeholder="0.00"
                               class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-xl text-lg
                                      focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    </div>
                </div>
                <div>
                    <label for="sell_price" class="block text-sm font-medium text-gray-700 mb-1">
                        Precio Venta *
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-3 text-gray-400 text-lg">$</span>
                        <input type="number" id="sell_price" name="sell_price" required
                               step="0.01" min="0.01"
                               value="{{ data.get('sell_price') or (product.sell_price if product else '') or '' }}"
                               placeholder="0.00"
                               class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-xl text-lg
                                      focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    </div>
                </div>
            </div>

            <!-- Botones -->
            <div class="flex gap-3 pt-4">
                <button type="submit"
                        class="flex-1 bg-primary-600 hover:bg-primary-700 text-white
                               font-semibold py-4 rounded-xl text-lg transition active:scale-[0.98]">
                    {{ 'Guardar Cambios' if product else 'Crear Producto' }}
                </button>
                <a href="{{ url_for('products.index') }}"
                   class="px-6 py-4 bg-gray-200 hover:bg-gray-300 text-gray-700
                          rounded-xl text-lg font-medium transition text-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
