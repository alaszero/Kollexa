{% extends "base.html" %}
{% block title %}Entrada de Mercancía - Kollexa{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('inventory.index') }}"
           class="bg-gray-200 hover:bg-gray-300 p-3 rounded-xl transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-800">Entrada de Mercancía</h1>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <div>
                <label for="product_id" class="block text-sm font-medium text-gray-700 mb-1">
                    Producto *
                </label>
                <select id="product_id" name="product_id" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg bg-white
                               focus:ring-2 focus:ring-primary-500">
                    <option value="">Seleccionar producto...</option>
                    {% for p in products %}
                    <option value="{{ p.id }}">{{ p.name }}{% if p.sku %} ({{ p.sku }}){% endif %}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">
                    Cantidad *
                </label>
                <input type="number" id="quantity" name="quantity" required
                       min="1" step="1"
                       placeholder="Ej: 50"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                              focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <div>
                <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">
                    Notas <span class="text-gray-400">(opcional)</span>
                </label>
                <textarea id="notes" name="notes" rows="2"
                          placeholder="Ej: Compra a proveedor X, factura #123"
                          class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                                 focus:ring-2 focus:ring-primary-500 focus:border-primary-500"></textarea>
            </div>

            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white
                           font-semibold py-4 rounded-xl text-lg transition active:scale-[0.98]">
                Registrar Entrada
            </button>
        </form>
    </div>
</div>
{% endblock %}
