{% extends "base.html" %}
{% block title %}Iniciar Sesión - Kollexa{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <!-- Logo -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-primary-700">Kollexa</h1>
                <p class="text-gray-500 mt-2">Sistema de Gestión</p>
            </div>

            <!-- Formulario -->
            <form method="POST" action="{{ url_for('web_auth.login') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                        Usuario
                    </label>
                    <input type="text" id="username" name="username" required autofocus
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                                  focus:ring-2 focus:ring-primary-500 focus:border-primary-500
                                  transition"
                           placeholder="Tu nombre de usuario">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Contraseña
                    </label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg
                                  focus:ring-2 focus:ring-primary-500 focus:border-primary-500
                                  transition"
                           placeholder="Tu contraseña">
                </div>

                <button type="submit"
                        class="w-full bg-primary-600 hover:bg-primary-700 text-white
                               font-semibold py-4 px-6 rounded-xl text-lg
                               transition transform active:scale-[0.98]
                               focus:ring-4 focus:ring-primary-300">
                    Iniciar Sesión
                </button>
            </form>
        </div>

        <p class="text-center text-gray-400 text-sm mt-6">
            Kollexa v{{ config.VERSION }}
        </p>
    </div>
</div>
{% endblock %}
